<form class="search-bar" (ngSubmit)="onSubmit()">
  <input
    type="text"
    class="search-input"
    placeholder="Enter a city (e.g. Sydney, Melbourne...)"
    [(ngModel)]="city"
    name="city"
    autocomplete="off"
  />
  <button type="submit" class="search-btn" [disabled]="!city.trim()">
    <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/>
      <line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    Search
  </button>
</form>
